spring:
  application:
    name: shivam-printers

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shivam_printers}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html

server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

app:
  name: Shivam Printers
  tagline: Premium Printing & Graphic Design
  upload-dir: uploads
  base-url: ${APP_BASE_URL:http://localhost:8080}

  admin:
    email: admin@shivamprinters.com
    password: Admin@123456

  mail:
    from: noreply@shivamprinters.com
    enabled: false

logging:
  level:
    root: INFO
    com.shivamprinters: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api/docs

  swagger-ui:
    path: /api/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha