<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}"></head>
<body class="gradient-bg mesh-bg">
<div th:replace="~{layout/base :: header}"></div>
<main class="pt-24 pb-20 flex items-center min-h-[80vh]">
    <div class="max-w-md mx-auto px-4 w-full reveal">
        <div class="glass-card">
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-accent-cyan flex items-center justify-center mx-auto mb-4 shadow-glow">
                    <span class="text-white font-bold text-xl">SP</span>
                </div>
                <h1 class="text-2xl font-bold">Welcome Back</h1>
                <p class="text-slate-400 text-sm mt-2">Sign in to your Shivam Printers account</p>
            </div>
            <div th:if="${errorMessage}" class="mb-4 p-3 rounded-xl bg-red-500/20 text-red-400 text-sm text-center" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="mb-4 p-3 rounded-xl bg-green-500/20 text-green-400 text-sm text-center" th:text="${successMessage}"></div>
            <form th:action="@{/login}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div><label class="block text-sm mb-2">Email</label><input type="email" name="email" class="input-field" required autofocus/></div>
                <div><label class="block text-sm mb-2">Password</label><input type="password" name="password" class="input-field" required/></div>
                <div class="flex justify-between text-sm">
                    <a href="/forgot-password" class="text-brand-400 hover:text-brand-300">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary w-full">Sign In</button>
            </form>
            <p class="text-center text-sm text-slate-400 mt-6">Don't have an account? <a href="/register" class="text-brand-400 hover:text-brand-300">Register</a></p>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
