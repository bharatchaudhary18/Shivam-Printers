<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}"></head>
<body class="gradient-bg mesh-bg">
<div th:replace="~{layout/base :: header}"></div>
<main class="pt-24 pb-20 flex items-center min-h-[80vh]">
    <div class="max-w-md mx-auto px-4 w-full reveal">
        <div class="glass-card">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold">Create Account</h1>
                <p class="text-slate-400 text-sm mt-2">Join Shivam Printers today</p>
            </div>
            <div th:if="${errorMessage}" class="mb-4 p-3 rounded-xl bg-red-500/20 text-red-400 text-sm text-center" th:text="${errorMessage}"></div>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm mb-2">First Name</label><input type="text" th:field="*{firstName}" class="input-field" required/></div>
                    <div><label class="block text-sm mb-2">Last Name</label><input type="text" th:field="*{lastName}" class="input-field" required/></div>
                </div>
                <div><label class="block text-sm mb-2">Email</label><input type="email" th:field="*{email}" class="input-field" required/></div>
                <div><label class="block text-sm mb-2">Phone</label><input type="tel" th:field="*{phone}" class="input-field"/></div>
                <div><label class="block text-sm mb-2">Password</label><input type="password" th:field="*{password}" class="input-field" required minlength="8"/></div>
                <button type="submit" class="btn-primary w-full">Create Account</button>
            </form>
            <p class="text-center text-sm text-slate-400 mt-6">Already have an account? <a href="/login" class="text-brand-400">Sign in</a></p>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
