<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}"></head>
<body class="gradient-bg mesh-bg">
<div th:replace="~{layout/base :: header}"></div>
<main class="pt-24 pb-20 flex items-center min-h-[80vh]">
    <div class="max-w-md mx-auto px-4 w-full reveal">
        <div class="glass-card text-center">
            <h1 class="text-2xl font-bold mb-4">Forgot Password</h1>
            <p class="text-slate-400 text-sm mb-8">Enter your email address and we'll send you instructions to reset your password.</p>
            <form class="space-y-4">
                <div><input type="email" placeholder="Email address" class="input-field" required/></div>
                <button type="button" class="btn-primary w-full" onclick="alert('Password reset link sent! (Demo feature)')">Send Reset Link</button>
            </form>
            <a href="/login" class="inline-block mt-6 text-sm text-brand-400">← Back to login</a>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
