<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="dashboard-head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle + ' | Dashboard | Shivam Printers'}">Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<aside th:fragment="customer-sidebar" class="dashboard-sidebar fixed left-0 top-0 h-full w-64 border-r border-white/10 p-6 hidden lg:block z-40">
    <a href="/" class="flex items-center gap-2 mb-10">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-sm font-bold">SP</div>
        <span class="font-bold">Shivam Printers</span>
    </a>
    <nav class="space-y-1">
        <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">📊 Dashboard</a>
        <a href="/dashboard/profile" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">👤 Profile</a>
        <a href="/dashboard/orders" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">📦 Orders</a>
        <a href="/dashboard/orders/new" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">➕ New Request</a>
        <a href="/dashboard/invoices" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">🧾 Invoices</a>
        <a href="/dashboard/notifications" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition text-sm">🔔 Notifications</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="absolute bottom-6 left-6 right-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-secondary w-full text-sm">Logout</button>
    </form>
</aside>

<aside th:fragment="admin-sidebar" class="dashboard-sidebar fixed left-0 top-0 h-full w-64 border-r border-white/10 p-6 hidden lg:block z-40">
    <a href="/" class="flex items-center gap-2 mb-10">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-sm font-bold">SP</div>
        <span class="font-bold">Admin Panel</span>
    </a>
    <nav class="space-y-1 text-sm">
        <a href="/admin" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">📊 Analytics</a>
        <a href="/admin/users" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">👥 Users</a>
        <a href="/admin/orders" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">📦 Orders</a>
        <a href="/admin/services" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">🎨 Services</a>
        <a href="/admin/portfolio" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">🖼 Portfolio</a>
        <a href="/admin/testimonials" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">💬 Testimonials</a>
        <a href="/admin/blog" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">📝 Blog</a>
        <a href="/admin/inquiries" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5">📩 Inquiries</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="absolute bottom-6 left-6 right-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-secondary w-full text-sm">Logout</button>
    </form>
</aside>

<script th:fragment="dashboard-scripts" th:src="@{/js/main.js}"></script>
</body>
</html>
