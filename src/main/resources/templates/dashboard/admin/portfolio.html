<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard/layout :: dashboard-head(${pageTitle})}"></head>
<body class="gradient-bg min-h-screen">
<div th:replace="~{dashboard/layout :: admin-sidebar}"></div>
<div class="lg:ml-64 p-6 lg:p-8">
    <h1 class="text-2xl font-bold mb-8" th:text="${pageTitle}">Portfolio</h1>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="item : ${portfolios.content}" class="glass-card p-0 overflow-hidden">
            <img th:src="${item.imageUrl}" th:alt="${item.title}" class="w-full aspect-video object-cover"/>
            <div class="p-4">
                <p class="text-brand-400 text-xs" th:text="${item.categoryName}">Category</p>
                <h3 class="font-semibold" th:text="${item.title}">Title</h3>
            </div>
        </div>
    </div>
</div>
<script th:replace="~{dashboard/layout :: dashboard-scripts}"></script>
</body>
</html>
