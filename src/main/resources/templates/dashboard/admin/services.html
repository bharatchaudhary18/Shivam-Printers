<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard/layout :: dashboard-head(${pageTitle})}"></head>
<body class="gradient-bg min-h-screen">
<div th:replace="~{dashboard/layout :: admin-sidebar}"></div>
<div class="lg:ml-64 p-6 lg:p-8">
    <h1 class="text-2xl font-bold mb-8" th:text="${pageTitle}">Services</h1>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="service : ${services}" class="glass-card">
            <h3 class="font-semibold mb-2" th:text="${service.name}">Service</h3>
            <p class="text-sm text-slate-400 mb-3" th:text="${service.shortDescription}">Desc</p>
            <div class="flex justify-between items-center">
                <span class="text-brand-400 font-semibold" th:text="'₹' + ${#numbers.formatDecimal(service.basePrice, 0, 'COMMA', 0, 'POINT')}">Price</span>
                <span th:if="${service.featured}" class="text-xs px-2 py-1 rounded bg-amber-500/20 text-amber-400">Featured</span>
            </div>
        </div>
    </div>
</div>
<script th:replace="~{dashboard/layout :: dashboard-scripts}"></script>
</body>
</html>
