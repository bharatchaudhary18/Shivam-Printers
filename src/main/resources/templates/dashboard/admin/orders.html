<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard/layout :: dashboard-head(${pageTitle})}"></head>
<body class="gradient-bg min-h-screen">
<div th:replace="~{dashboard/layout :: admin-sidebar}"></div>
<div class="lg:ml-64 p-6 lg:p-8">
    <h1 class="text-2xl font-bold mb-4" th:text="${pageTitle}">Orders</h1>
    <div th:if="${successMessage}" class="mb-4 p-3 rounded-xl bg-green-500/20 text-green-400 text-sm" th:text="${successMessage}"></div>
    <div class="glass-card overflow-x-auto">
        <table class="w-full text-sm">
            <thead><tr class="border-b border-white/10"><th class="text-left py-3 px-4">Order #</th><th class="text-left py-3">Status</th><th class="text-right py-3">Amount</th><th class="text-right py-3">Actions</th></tr></thead>
            <tbody>
                <tr th:each="order : ${orders.content}" class="border-b border-white/5">
                    <td class="py-3 px-4 font-medium" th:text="${order.orderNumber}">Order</td>
                    <td class="py-3"><span class="px-2 py-1 rounded-lg bg-brand-500/20 text-brand-400 text-xs" th:text="${order.status}">Status</span></td>
                    <td class="py-3 text-right" th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}">₹0</td>
                    <td class="py-3 text-right">
                        <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="inline-flex gap-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <select name="status" class="input-field text-xs py-1 w-auto">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s.name() == order.status}">Status</option>
                            </select>
                            <button type="submit" class="btn-secondary text-xs px-3 py-1">Update</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script th:replace="~{dashboard/layout :: dashboard-scripts}"></script>
</body>
</html>
