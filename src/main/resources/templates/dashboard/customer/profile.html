<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard/layout :: dashboard-head(${pageTitle})}"></head>
<body class="gradient-bg min-h-screen">
<div th:replace="~{dashboard/layout :: customer-sidebar}"></div>
<div class="lg:ml-64 p-6 lg:p-8">
    <h1 class="text-2xl font-bold mb-8" th:text="${pageTitle}">Profile</h1>
    <div th:if="${successMessage}" class="mb-4 p-4 rounded-xl bg-green-500/20 text-green-400 text-sm" th:text="${successMessage}"></div>
    <div class="glass-card max-w-2xl">
        <form th:action="@{/dashboard/profile}" th:object="${profileRequest}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm mb-2">First Name</label><input type="text" name="firstName" th:value="${user.firstName}" class="input-field"/></div>
                <div><label class="block text-sm mb-2">Last Name</label><input type="text" name="lastName" th:value="${user.lastName}" class="input-field"/></div>
            </div>
            <div><label class="block text-sm mb-2">Email</label><input type="email" th:value="${user.email}" class="input-field" disabled/></div>
            <div><label class="block text-sm mb-2">Phone</label><input type="tel" name="phone" th:value="${user.phone}" class="input-field"/></div>
            <div><label class="block text-sm mb-2">Address</label><input type="text" name="address" th:value="${user.address}" class="input-field"/></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm mb-2">City</label><input type="text" name="city" th:value="${user.city}" class="input-field"/></div>
                <div><label class="block text-sm mb-2">State</label><input type="text" name="state" th:value="${user.state}" class="input-field"/></div>
            </div>
            <button type="submit" class="btn-primary">Save Changes</button>
        </form>
    </div>
</div>
<script th:replace="~{dashboard/layout :: dashboard-scripts}"></script>
</body>
</html>
