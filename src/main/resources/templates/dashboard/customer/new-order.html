<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard/layout :: dashboard-head(${pageTitle})}"></head>
<body class="gradient-bg min-h-screen">
<div th:replace="~{dashboard/layout :: customer-sidebar}"></div>
<div class="lg:ml-64 p-6 lg:p-8">
    <h1 class="text-2xl font-bold mb-8" th:text="${pageTitle}">New Service Request</h1>
    <div class="glass-card max-w-2xl">
        <form th:action="@{/dashboard/orders}" method="post" enctype="multipart/form-data" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div><label class="block text-sm mb-2">Service *</label>
                <select name="serviceId" class="input-field" required onchange="document.getElementById('serviceName').value=this.options[this.selectedIndex].text">
                    <option value="">Select service</option>
                    <option th:each="s : ${services}" th:value="${s.id}" th:text="${s.name}">Service</option>
                </select>
                <input type="hidden" id="serviceName" name="serviceName" value=""/>
            </div>
            <div><label class="block text-sm mb-2">Quantity</label><input type="number" name="quantity" value="1" min="1" class="input-field"/></div>
            <div><label class="block text-sm mb-2">Specifications</label><textarea name="specifications" rows="4" class="input-field" placeholder="Size, colors, material, etc."></textarea></div>
            <div><label class="block text-sm mb-2">Notes</label><textarea name="notes" rows="3" class="input-field"></textarea></div>
            <div><label class="block text-sm mb-2">Upload Requirements</label><input type="file" name="requirementFile" class="input-field" accept=".pdf,.jpg,.jpeg,.png,.ai,.psd"/></div>
            <button type="submit" class="btn-primary">Submit Request</button>
        </form>
    </div>
</div>
<script th:replace="~{dashboard/layout :: dashboard-scripts}"></script>
</body>
</html>
