<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}"></head>
<body class="gradient-bg mesh-bg">
<div th:replace="~{layout/base :: header}"></div>
<main class="pt-24 pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid lg:grid-cols-2 gap-12">
            <div class="reveal">
                <h1 class="section-heading mb-6">Contact Us</h1>
                <p class="text-slate-400 mb-8">Ready to start your project? Fill out the form and we'll get back to you within 24 hours.</p>
                <div class="space-y-4 text-slate-400">
                    <p>📍 123 Design Street, Mumbai, Maharashtra 400001</p>
                    <p>📞 +91 98765 43210</p>
                    <p>✉️ info@shivamprinters.com</p>
                    <p>🕐 Mon-Sat: 9AM - 7PM</p>
                </div>
            </div>
            <div class="glass-card reveal">
                <div th:if="${successMessage}" class="mb-4 p-4 rounded-xl bg-green-500/20 text-green-400 text-sm" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="mb-4 p-4 rounded-xl bg-red-500/20 text-red-400 text-sm" th:text="${errorMessage}"></div>
                <form th:action="@{/contact}" th:object="${contactRequest}" method="post" class="space-y-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div><label class="block text-sm mb-2">Name *</label><input type="text" th:field="*{name}" class="input-field" required/></div>
                    <div><label class="block text-sm mb-2">Email *</label><input type="email" th:field="*{email}" class="input-field" required/></div>
                    <div><label class="block text-sm mb-2">Phone</label><input type="tel" th:field="*{phone}" class="input-field"/></div>
                    <div><label class="block text-sm mb-2">Service</label>
                        <select th:field="*{service}" class="input-field">
                            <option value="">Select a service</option>
                            <option th:each="s : ${services}" th:value="${s.name}" th:text="${s.name}">Service</option>
                        </select>
                    </div>
                    <div><label class="block text-sm mb-2">Subject</label><input type="text" th:field="*{subject}" class="input-field"/></div>
                    <div><label class="block text-sm mb-2">Message *</label><textarea th:field="*{message}" rows="5" class="input-field" required></textarea></div>
                    <button type="submit" class="btn-primary w-full">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/base :: footer}"></div>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
